# Nginx config to serve the Qalor static site with precompressed assets
# Place this file on your server (e.g. /etc/nginx/sites-available/qalor) and enable it
# Adjust paths, server_name and SSL cert locations to match your environment.

server {
  listen 80;
  server_name qalor.nl www.qalor.nl;

  # Redirect all HTTP -> HTTPS
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name qalor.nl www.qalor.nl;

  # TLS certs - change to your actual cert paths (Let's Encrypt example below)
  ssl_certificate /etc/letsencrypt/live/qalor.nl/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/qalor.nl/privkey.pem;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;

  # Recommended security headers (tweak as needed)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  # Root should point to your built site (dist/ or docs/)
  root /var/www/qalor; # <-- update to your actual path containing index.html and assets/
  index index.html;

  # Serve precompressed .br and .gz automatically when available.
  # Requires nginx compiled with brotli_static and gzip_static (or the modules enabled).
  # If those are not present, nginx will just serve the original file.
  brotli_static on;
  gzip_static on;

  # Cache and headers for text assets (JS/CSS/HTML/JSON). Preserve Accept-Encoding negotiation.
  location ~* \.(?:js|css|html|svg|json|txt|xml)$ {
    # Let nginx automatically serve .br/.gz when available
    brotli_static on;
    gzip_static on;

    # Important for caches/proxies
    add_header Vary Accept-Encoding;

    # Hashed assets can be cached long; keep index.html short
    expires 30d;
    access_log off;
    try_files $uri $uri/ /index.html;
  }

  # Index.html (short cache) and SPA fallback
  location = /index.html {
    add_header Vary Accept-Encoding;
    expires 0;
    try_files $uri =404;
  }

  # Serve images, fonts and media with long caching
  location ~* \.(?:png|jpg|jpeg|webp|gif|ico|woff2?|ttf|eot|otf|pdf)$ {
    expires 30d;
    access_log off;
    try_files $uri =404;
  }

  # PDF worker folder (ensure pdfjs files exist under /pdfjs/ in your root)
  location /pdfjs/ {
    # These are static files served from dist/pdfjs/
    add_header Vary Accept-Encoding;
    try_files $uri =404;
  }

  # Catch-all: SPA fallback to index.html for client-side routing
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Optional: enable gzip on-the-fly (fallback when static compressed files aren't present)
  gzip on;
  gzip_types text/plain application/javascript application/json text/css application/xml text/xml image/svg+xml;
  gzip_vary on;
  gzip_min_length 1024;

  # Optional: brotli on-the-fly (requires ngx_brotli module compiled in)
  brotli on;
  brotli_types text/plain application/javascript application/json text/css application/xml text/xml image/svg+xml;
  brotli_comp_level 4;
}
